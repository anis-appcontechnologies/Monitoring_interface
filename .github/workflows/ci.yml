name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyelftools pytest
          pip install protocol || true

      - name: Run protocol tests
        run: python -m pytest tests/ -v

      - name: Verify core imports
        run: python -c "import protocol; import settings; import elf_reader; print('imports OK')"

      - name: Lint check (non-blocking)
        run: |
          pip install pyflakes
          python -m pyflakes protocol.py settings.py elf_reader.py || echo "Warnings only"
        continue-on-error: true
